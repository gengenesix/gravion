version: "3.8"

services:
  gravion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gravion-app
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - NEO4J_URI=bolt://neo4j:7687
      - TRACCAR_URL=http://traccar:8082
      - OLLAMA_URL=http://ollama:11434
      - SPIDERFOOT_URL=http://spiderfoot:5001
      - OPENCTI_URL=http://opencti:8080
    depends_on:
      - neo4j
      - traccar
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - gravion_data:/app/data

  nginx:
    image: nginx:alpine
    container_name: gravion-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - gravion
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: gravion-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/gravion_neo4j_2024
      - NEO4J_PLUGINS=["graph-data-science", "apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  traccar:
    image: traccar/traccar:latest
    container_name: gravion-traccar
    ports:
      - "8082:8082"
      - "5055:5055"
    volumes:
      - traccar_data:/opt/traccar/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: gravion-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ─── OSINT & Intelligence Tools ─────────────────────────────────────────────

  spiderfoot:
    build:
      context: .
      dockerfile: Dockerfile.spiderfoot
    container_name: gravion-spiderfoot
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/home/spiderfoot/.spiderfoot
    restart: unless-stopped

  opencti:
    image: opencti/platform:6.3.9
    container_name: gravion-opencti
    ports:
      - "8888:8080"
    environment:
      - APP__PORT=8080
      - APP__BASE_URL=http://localhost:8888
      - APP__ADMIN__EMAIL=admin@gravion.local
      - APP__ADMIN__PASSWORD=GravionCTI2024!
      - APP__ADMIN__TOKEN=gravion-opencti-token-2024
      - REDIS__HOSTNAME=redis
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=gravion_minio
      - MINIO__SECRET_KEY=gravion_minio_secret
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__USERNAME=gravion
      - RABBITMQ__PASSWORD=gravion_rabbit
      - SMTP__HOSTNAME=localhost
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
    depends_on:
      - redis
      - elasticsearch
      - minio
      - rabbitmq
    restart: unless-stopped
    profiles: ["heavy"] # Only start with: docker compose --profile heavy up

  redis:
    image: redis:7-alpine
    container_name: gravion-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    profiles: ["heavy"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: gravion-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    profiles: ["heavy"]

  minio:
    image: minio/minio:latest
    container_name: gravion-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=gravion_minio
      - MINIO_ROOT_PASSWORD=gravion_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    profiles: ["heavy"]

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: gravion-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=gravion
      - RABBITMQ_DEFAULT_PASS=gravion_rabbit
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    profiles: ["heavy"]

volumes:
  gravion_data:
  neo4j_data:
  neo4j_logs:
  traccar_data:
  ollama_data:
  spiderfoot_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  rabbitmq_data:

networks:
  default:
    name: gravion-network
    driver: bridge
