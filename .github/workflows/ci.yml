name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-client:
    name: Test Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./client

      - name: Lint
        run: npm run lint
        working-directory: ./client

      - name: Run tests
        run: npm test
        working-directory: ./client

      - name: Build
        run: npm run build
        working-directory: ./client

  test-server:
    name: Test Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Build
        run: npm run build
        working-directory: ./server

      - name: Run tests (if available)
        run: npm test --if-present
        working-directory: ./server

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run security audit (client)
        run: npm audit --audit-level=high
        working-directory: ./client
        continue-on-error: true

      - name: Run security audit (server)
        run: npm audit --audit-level=high
        working-directory: ./server
        continue-on-error: true
